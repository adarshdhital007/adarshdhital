<!DOCTYPE html>
<html>
<head>
  <title>404 Page Not Found</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9f9f9;
      text-align: center;
      padding: 50px;
    }
    h1 {
      font-size: 48px;
      color: #333333;
      margin-top: 0;
    }
    p {
      font-size: 24px;
      color: #666666;
      margin-bottom: 30px;
    }
    a {
      display: inline-block;
      background-color: #22c306;
      color: #ffffff;
      font-size: 20px;
      text-decoration: none;
      padding: 10px 30px;
      border-radius: 4px;
      transition: background-color 0.3s ease;
    }
    a:hover {
      background-color: #4df819;
    }
    .image-container {
      margin-top: 50px;
    }
    .image {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Oops! Page Not Found</h1>
  <p>We're sorry, but the page you requested could not be found.</p>
  <a href="https://adarshkhatri.com.np">Ctrl + Z</a>
</body>
</html>
